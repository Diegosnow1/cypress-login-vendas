name: Cypress Tests

on:
  push:
    branches:
      - main
      - dev

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run Cypress with Cloud
        run: npx cypress run --record --key ${{ secrets.CYPRESS_RECORD_KEY }}
